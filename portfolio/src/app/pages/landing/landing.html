<div class="bg-background min-h-screen p-4 md:p-6">
    <!-- Navbar (Header) -->
    <app-bento-navbar title="KILIAN AUDROIN" [navItems]="navItems"></app-bento-navbar>

    <!-- Main Grid with Grid Areas -->
    <div class="landing-grid mt-6">
        <div class="grid-profile">
            <app-bento-profile-picture imageUrl="/images/profile-pic-ki.jpg"
                altText="My profile picture"></app-bento-profile-picture>
        </div>

        <div class="grid-title">
            <app-bento-title-description title="Web developper & freelance"
                description="J'accompagne les projets webs en tant que développeur full-stack, soit sur une stack Symfony/PHP, soit sur une stack .NET/Angular. Porté par la curiosité et la qualité, je m'engage à livrer un code fiable et évolutif."></app-bento-title-description>
        </div>

        <div class="grid-carousel">
            <app-bento-carousel [projects]="projects"></app-bento-carousel>
        </div>

        <div class="grid-social">
            <app-bento-social></app-bento-social>
        </div>
    </div>
</div>
