<app-loader (loadingComplete)="onLoadingComplete()"></app-loader>

<div class="bg-background min-h-screen md:h-screen flex flex-col">
    <div class="landing-grid px-4 md:px-6 py-4 md:py-6 m-0">
        <app-bento-navbar class="grid-navbar" title="KILIAN AUDROIN" [navItems]="navItems"></app-bento-navbar>

        <app-bento-profile-picture class="grid-profile" imageUrl="/images/profile-pic-ki-small.webp"
            altText="My profile picture"></app-bento-profile-picture>

        <app-bento-title-description class="grid-title title-description" title="Web developper"
            description="J'accompagne les projets webs en tant que développeur full-stack, soit sur une stack Symfony/PHP, soit sur une stack .NET/Angular. Porté par la curiosité et la qualité, je m'engage à livrer un code fiable et évolutif."></app-bento-title-description>



        <app-bento-title class="grid-title-only title-only" title="Web developper"></app-bento-title>
        <app-bento-description class="grid-description-only description-only"
            description="J'accompagne les projets webs en tant que développeur full-stack, soit sur une stack Symfony/PHP, soit sur une stack .NET/Angular. Porté par la curiosité et la qualité, je m'engage à livrer un code fiable et évolutif."></app-bento-description>

        <app-bento-carousel class="grid-carousel" [projects]="projects"></app-bento-carousel>

        <app-bento-social class="grid-social"></app-bento-social>
    </div>
</div>
