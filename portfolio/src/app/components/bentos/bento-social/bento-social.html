<div
    class="w-full h-full rounded-3xl bg-primary border border-secondary shadow-sm hover:shadow-md transition-shadow duration-300 p-6 md:p-8 flex items-center justify-center">
    <div class="flex gap-4 flex-wrap justify-center">
        @for (link of socialLinks; track link.label) {
        <button (click)="handleClick(link)"
            class="social-button flex flex-col items-center gap-2 p-4 bg-secondary rounded-2xl text-text font-medium transition-all duration-300 hover:bg-text hover:text-primary hover:scale-110 focus:outline-none focus:ring-2 focus:ring-text focus:ring-offset-2"
            [attr.aria-label]="link.label">
            <i [ngClass]="link.icon" class="text-2xl"></i>
            <span class="social-label text-sm">{{ link.label }}</span>
        </button>
        }
    </div>
</div>
