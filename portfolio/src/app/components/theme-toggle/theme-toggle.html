<button (click)="toggleTheme()" class="theme-toggle" [class.dark]="isDark" aria-label="Toggle theme">
    <div class="toggle-track">
        <div class="toggle-circle">
            <span class="icon sun-icon">☀️</span>
            <span class="icon moon-icon">🌙</span>
        </div>
    </div>
</button>
